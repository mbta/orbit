name: Deploy Orbit

on:
  workflow_call:
    inputs:
      env:
        required: true
        type: string
      version-name:
        required: true
        type: string
        description: descriptive id of what's deployed (e.g. release name or pr number). doesn't have to be unique, the git hash is appended later
    secrets:
      AWS_ROLE_ARN:
        required: true
      DOCKER_REPO:
        required: true
      SLACK_WEBHOOK:
        required: true

permissions: {}

jobs:
  deploy:
    name: Deploy to ${{ inputs.env }}
    timeout-minutes: 30
    runs-on: ubuntu-latest
    permissions:
      id-token: write # allows workflow to exchange short-lived tokens directly from cloud provider
      contents: read
    environment: ${{ inputs.env }}

    steps:
      - uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Get versions
        id: calc-version
        env:
          VERSION: ${{ inputs.version-name }}
          ENV: ${{ inputs.env }}
          DOCKER_REPO: ${{ secrets.DOCKER_REPO }}
        run: |
          docker_repo="${DOCKER_REPO}"
          git_hash="$(git rev-parse --short HEAD)"
          version_id="${VERSION}-$git_hash"
          git_hash_tag="$docker_repo:git-$git_hash"
          latest_env_tag="$docker_repo:latest-${ENV}"
          version_tag="$docker_repo:$version_id"
          echo "version-id=$version_id" | tee -a $GITHUB_OUTPUT
          echo "deploy-tag=$version_tag" | tee -a $GITHUB_OUTPUT
          printf "tag-list=%s,%s,%s\n" "$git_hash_tag" "$latest_env_tag" "$version_tag" | tee -a $GITHUB_OUTPUT
      - uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2.1.6
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          no-cache: true
          # FIXME: Caching is temporarily disabled due to GH issues
          # cache-from: type=gha
          build-args: |
            RELEASE=${{ steps.calc-version.outputs.version-id }}
          tags: ${{ steps.calc-version.outputs.tag-list }}
          push: true
      - uses: mbta/actions/deploy-ecs@d37877022d4ae12e96663d2e0a970a5214a2e232 # v2.20
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          ecs-cluster: orbit
          ecs-service: orbit-${{ inputs.env }}
          docker-tag: ${{ steps.calc-version.outputs.deploy-tag }}
      - uses: mbta/actions/notify-slack-deploy@d37877022d4ae12e96663d2e0a970a5214a2e232 # v2.20
        if: ${{ !cancelled() }}
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          job-status: ${{ job.status }}
          custom-message: Deployed ${{ steps.calc-version.outputs.version-id }} to ${{ inputs.env }}
